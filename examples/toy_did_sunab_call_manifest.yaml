template: econometrics_call_manifest
version: v2
updated: 2026-05-25
project: econometrics_toolbox
phase: phase_2_pilot

call:
  call_id: TOY_DID_SUNAB_001
  allowed_reason: "v1-2 smoke"
  source_empirical_plan: "examples/toy_did_sunab_call_manifest.yaml"
  source_gate_status: qa/gate_status.yaml
  source_methodology_spec: ""
  source_preprocessing_spec: ""
  backend_language: R
  r_entrypoint: R/run_call_manifest.R

input:
  data_path: examples/toy_did_panel.csv
  data_hash: ""
  row_count_before_filter: 240
  required_columns:
    - unit_id
    - time_id
    - treatment
    - outcome
    - cohort
    - time_to_treat
  sample_filter: ""
  missing_policy: complete_cases

specification:
  method_family: did
  did_variant: sun_abraham
  dependent_variable: outcome
  treatment_indicator: treatment
  key_regressor_or_treatment: treatment
  cohort_var: cohort
  time_to_treat_var: time_to_treat
  never_treated_value: 0
  controls: []
  fixed_effects: []
  panel:
    unit: unit_id
    time: time_id
  weights: ""
  estimator: fixest_feols
  covariance_method: clustered
  cluster_variables:
    - unit_id
  hac_settings:
    enabled: false
    lag: ~
    kernel: ""

outputs:
  result_manifest_path: output/toy_did_sunab_result_manifest.yaml
  coefficient_table_path: output/toy_did_sunab_coefficients.csv
  model_summary_path: output/toy_did_sunab_model_summary.txt
  log_path: ""

forbidden_changes:
  - outcome
  - sample_filter
  - controls
  - fixed_effects
  - covariance_method
  - cluster_variables
  - did_variant
  - cohort_var
  - time_to_treat_var

failure_policy: fail_closed
